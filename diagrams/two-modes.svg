<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <defs>
    <filter id="gl"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="ag" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
    <marker id="ac" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22d3ee"/></marker>
  </defs>

  <rect width="800" height="320" rx="16" fill="#0a1628"/>

  <!-- ═══ CENTRAL AGENT ═══ -->
  <rect x="280" y="85" width="240" height="100" rx="14" fill="#0d1f38" stroke="rgba(167,139,250,0.35)" stroke-width="2" filter="url(#gl)"/>
  <text x="400" y="115" text-anchor="middle" fill="#a78bfa" font-size="18" font-weight="700">HR Assistant</text>
  <text x="400" y="138" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="JetBrains Mono, monospace">Corail · gpt-4o · port 8000</text>
  <text x="400" y="158" text-anchor="middle" fill="#64748b" font-size="10">LLM · Tools · RAG · Memory · Guards</text>
  <text x="400" y="175" text-anchor="middle" fill="#64748b" font-size="10">REST · Slack · CLI · WebSocket</text>

  <!-- ═══ LEFT: Direct access (green) ═══ -->
  <text x="100" y="30" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600" letter-spacing="2" font-family="JetBrains Mono, monospace">DIRECT ACCESS</text>

  <rect x="30" y="52" width="140" height="36" rx="8" fill="#0d1f38" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="100" y="74" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">🤖  CI/CD Pipeline</text>

  <rect x="30" y="100" width="140" height="36" rx="8" fill="#0d1f38" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="100" y="122" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">💬  Slack Bot</text>

  <rect x="30" y="148" width="140" height="36" rx="8" fill="#0d1f38" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="100" y="170" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">⚡  Your Backend</text>

  <rect x="30" y="196" width="140" height="36" rx="8" fill="#0d1f38" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="100" y="218" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">🔧  MCP Client</text>

  <!-- Green arrows direct to agent -->
  <line x1="170" y1="70" x2="280" y2="115" stroke="#22c55e" stroke-width="1.3" marker-end="url(#ag)" opacity="0.8"/>
  <line x1="170" y1="118" x2="280" y2="128" stroke="#22c55e" stroke-width="1.3" marker-end="url(#ag)" opacity="0.8"/>
  <line x1="170" y1="166" x2="280" y2="142" stroke="#22c55e" stroke-width="1.3" marker-end="url(#ag)" opacity="0.8"/>
  <line x1="170" y1="214" x2="280" y2="155" stroke="#22c55e" stroke-width="1.3" marker-end="url(#ag)" opacity="0.8"/>

  <text x="225" y="95" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="500">direct</text>

  <!-- ═══ RIGHT: Platform access (cyan) ═══ -->
  <text x="700" y="30" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="600" letter-spacing="2" font-family="JetBrains Mono, monospace">PLATFORM ACCESS</text>

  <rect x="630" y="52" width="140" height="36" rx="8" fill="#0d1f38" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <text x="700" y="74" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="600">👤  Employee</text>

  <rect x="630" y="100" width="140" height="36" rx="8" fill="#0d1f38" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <text x="700" y="122" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="600">👩‍💼  Manager</text>

  <rect x="630" y="148" width="140" height="36" rx="8" fill="#0d1f38" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <text x="700" y="170" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="600">🔑  API Consumer</text>

  <!-- Récif box between users and agent -->
  <rect x="530" y="210" width="120" height="50" rx="10" fill="#0d1f38" stroke="rgba(34,211,238,0.3)" stroke-width="1.5"/>
  <text x="590" y="232" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="700">Récif</text>
  <text x="590" y="248" text-anchor="middle" fill="#64748b" font-size="9">Auth · Eval · Gov</text>

  <!-- Cyan arrows: users → Récif -->
  <line x1="630" y1="78" x2="595" y2="210" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#ac)" opacity="0.6"/>
  <line x1="630" y1="120" x2="593" y2="210" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#ac)" opacity="0.6"/>
  <line x1="630" y1="168" x2="590" y2="210" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#ac)" opacity="0.6"/>

  <!-- Cyan arrow: Récif → Agent -->
  <line x1="530" y1="235" x2="490" y2="170" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#ac)"/>
  <text x="520" y="210" text-anchor="middle" fill="#22d3ee" font-size="8" font-weight="500">proxy</text>

  <!-- ═══ BOTTOM: One message ═══ -->
  <text x="400" y="300" text-anchor="middle" fill="#94a3b8" font-size="11">Both paths reach the <tspan fill="#a78bfa" font-weight="700">same agent</tspan> simultaneously — no code changes needed</text>

  <!-- Subtle labels under columns -->
  <text x="100" y="252" text-anchor="middle" fill="#22c55e" font-size="8" opacity="0.6">no platform overhead</text>
  <text x="700" y="200" text-anchor="middle" fill="#22d3ee" font-size="8" opacity="0.6">+ governance, eval, monitoring</text>
</svg>
