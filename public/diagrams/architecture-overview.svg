<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
    </style>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#22d3ee" flood-opacity="0.15"/>
      <feComposite in2="blur" operator="in"/>
      <feComposite in="SourceGraphic" operator="over"/>
    </filter>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-muted" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#64748b" stroke-width="1.2"/>
    </marker>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a30"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bg-gradient)"/>

  <!-- ════════════ TOP LAYER: Users & Channels ════════════ -->
  <text x="400" y="20" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="10" font-weight="500" letter-spacing="2">USERS &amp; CHANNELS</text>

  <!-- Developer → REST API -->
  <rect x="40" y="32" width="220" height="52" rx="12" fill="#0d1f38" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>
  <text x="68" y="55" fill="#94a3b8" font-family="Inter, sans-serif" font-size="11">Developer</text>
  <text x="140" y="55" fill="#475569" font-family="Inter, sans-serif" font-size="11">&#x2192;</text>
  <text x="158" y="55" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500">REST API</text>
  <text x="150" y="73" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="9">POST /chat/stream</text>

  <!-- Employee → Slack -->
  <rect x="290" y="32" width="220" height="52" rx="12" fill="#0d1f38" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>
  <text x="318" y="55" fill="#94a3b8" font-family="Inter, sans-serif" font-size="11">Employee</text>
  <text x="389" y="55" fill="#475569" font-family="Inter, sans-serif" font-size="11">&#x2192;</text>
  <text x="407" y="55" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500">Slack</text>
  <text x="400" y="73" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="9">@bot mention</text>

  <!-- Bot → Cron -->
  <rect x="540" y="32" width="220" height="52" rx="12" fill="#0d1f38" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>
  <text x="575" y="55" fill="#94a3b8" font-family="Inter, sans-serif" font-size="11">Automation</text>
  <text x="647" y="55" fill="#475569" font-family="Inter, sans-serif" font-size="11">&#x2192;</text>
  <text x="665" y="55" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500">Cron</text>
  <text x="650" y="73" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="9">schedule trigger</text>

  <!-- Arrows: top → agents -->
  <line x1="150" y1="84" x2="150" y2="118" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)" opacity="0.6"/>
  <line x1="400" y1="84" x2="400" y2="118" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)" opacity="0.6"/>
  <line x1="650" y1="84" x2="650" y2="118" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)" opacity="0.6"/>

  <!-- ════════════ MIDDLE LAYER: Agents ════════════ -->
  <rect x="24" y="118" width="752" height="118" rx="14" fill="none" stroke="rgba(56,189,248,0.08)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="400" y="138" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="10" font-weight="500" letter-spacing="2">AGENT LAYER</text>
  <text x="400" y="150" text-anchor="middle" fill="#475569" font-family="JetBrains Mono, monospace" font-size="9">namespace: team-default</text>

  <!-- Agent 1: Code Reviewer (cyan accent) -->
  <rect x="52" y="158" width="210" height="62" rx="10" fill="#0d1f38" stroke="rgba(56,189,248,0.2)" stroke-width="1"/>
  <rect x="52" y="158" width="4" height="62" rx="2" fill="#22d3ee"/>
  <text x="72" y="178" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="12" font-weight="600">Code Reviewer</text>
  <text x="72" y="195" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9">ADK</text>
  <text x="105" y="195" fill="#64748b" font-family="Inter, sans-serif" font-size="9">/</text>
  <text x="115" y="195" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="9">claude</text>
  <text x="72" y="210" fill="#475569" font-family="JetBrains Mono, monospace" font-size="8">:8000</text>

  <!-- Agent 2: HR Assistant (green accent) -->
  <rect x="296" y="158" width="210" height="62" rx="10" fill="#0d1f38" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <rect x="296" y="158" width="4" height="62" rx="2" fill="#22c55e"/>
  <text x="316" y="178" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="12" font-weight="600">HR Assistant</text>
  <text x="316" y="195" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9">Corail</text>
  <text x="358" y="195" fill="#64748b" font-family="Inter, sans-serif" font-size="9">/</text>
  <text x="368" y="195" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="9">gpt-4o</text>
  <text x="316" y="210" fill="#475569" font-family="JetBrains Mono, monospace" font-size="8">:8000</text>

  <!-- Agent 3: Security Scanner (pink accent) -->
  <rect x="540" y="158" width="210" height="62" rx="10" fill="#0d1f38" stroke="rgba(244,114,182,0.2)" stroke-width="1"/>
  <rect x="540" y="158" width="4" height="62" rx="2" fill="#f472b6"/>
  <text x="560" y="178" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="12" font-weight="600">Security Scanner</text>
  <text x="560" y="195" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9">CrewAI</text>
  <text x="601" y="195" fill="#64748b" font-family="Inter, sans-serif" font-size="9">/</text>
  <text x="611" y="195" fill="#f472b6" font-family="JetBrains Mono, monospace" font-size="9">claude</text>
  <text x="560" y="210" fill="#475569" font-family="JetBrains Mono, monospace" font-size="8">:8000</text>

  <!-- Telemetry arrows: agents → platform -->
  <line x1="157" y1="220" x2="157" y2="262" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-muted)"/>
  <text x="167" y="248" fill="#475569" font-family="JetBrains Mono, monospace" font-size="7">telemetry</text>
  <line x1="401" y1="220" x2="401" y2="262" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-muted)"/>
  <text x="411" y="248" fill="#475569" font-family="JetBrains Mono, monospace" font-size="7">telemetry</text>
  <line x1="645" y1="220" x2="645" y2="262" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-muted)"/>
  <text x="655" y="248" fill="#475569" font-family="JetBrains Mono, monospace" font-size="7">telemetry</text>

  <!-- ════════════ BOTTOM LAYER: Platform ════════════ -->
  <rect x="24" y="262" width="752" height="128" rx="14" fill="#0d1f38" stroke="rgba(56,189,248,0.12)" stroke-width="1"/>
  <text x="400" y="282" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="10" font-weight="500" letter-spacing="2">PLATFORM LAYER</text>
  <text x="400" y="294" text-anchor="middle" fill="#475569" font-family="JetBrains Mono, monospace" font-size="9">namespace: recif-system</text>

  <!-- Platform boxes -->
  <rect x="52" y="304" width="155" height="38" rx="8" fill="#0a1628" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>
  <text x="82" y="321" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="11" font-weight="500">Récif API</text>
  <text x="82" y="335" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="9">Go :8080</text>

  <rect x="228" y="304" width="155" height="38" rx="8" fill="#0a1628" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>
  <text x="258" y="321" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="11" font-weight="500">Operator</text>
  <text x="258" y="335" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="9">kubebuilder</text>

  <rect x="404" y="304" width="155" height="38" rx="8" fill="#0a1628" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>
  <text x="434" y="321" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="11" font-weight="500">Dashboard</text>
  <text x="434" y="335" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="9">Next.js :3000</text>

  <rect x="580" y="304" width="155" height="38" rx="8" fill="#0a1628" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>
  <text x="610" y="321" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="11" font-weight="500">EventBus</text>
  <text x="610" y="335" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="9">pub/sub</text>

  <!-- Capabilities bar -->
  <rect x="52" y="352" width="683" height="28" rx="6" fill="#081220" stroke="rgba(56,189,248,0.08)" stroke-width="1"/>
  <text x="90" y="370" fill="#94a3b8" font-family="Inter, sans-serif" font-size="10">Governance</text>
  <text x="183" y="370" fill="#475569" font-family="Inter, sans-serif" font-size="10">|</text>
  <text x="210" y="370" fill="#94a3b8" font-family="Inter, sans-serif" font-size="10">Evaluation</text>
  <text x="300" y="370" fill="#475569" font-family="Inter, sans-serif" font-size="10">|</text>
  <text x="327" y="370" fill="#94a3b8" font-family="Inter, sans-serif" font-size="10">Releases</text>
  <text x="405" y="370" fill="#475569" font-family="Inter, sans-serif" font-size="10">|</text>
  <text x="432" y="370" fill="#94a3b8" font-family="Inter, sans-serif" font-size="10">Radar</text>
  <text x="490" y="370" fill="#475569" font-family="Inter, sans-serif" font-size="10">|</text>
  <text x="517" y="370" fill="#94a3b8" font-family="Inter, sans-serif" font-size="10">Feedback</text>
  <text x="600" y="370" fill="#475569" font-family="Inter, sans-serif" font-size="10">|</text>
  <text x="627" y="370" fill="#94a3b8" font-family="Inter, sans-serif" font-size="10">Multi-Tenancy</text>

  <!-- Arrows: platform → infra -->
  <line x1="220" y1="390" x2="220" y2="418" stroke="#64748b" stroke-width="1" marker-end="url(#arrow-muted)" opacity="0.5"/>
  <line x1="400" y1="390" x2="400" y2="418" stroke="#64748b" stroke-width="1" marker-end="url(#arrow-muted)" opacity="0.5"/>
  <line x1="580" y1="390" x2="580" y2="418" stroke="#64748b" stroke-width="1" marker-end="url(#arrow-muted)" opacity="0.5"/>

  <!-- ════════════ INFRASTRUCTURE ════════════ -->
  <text x="400" y="414" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="10" font-weight="500" letter-spacing="2">INFRASTRUCTURE</text>

  <!-- Infra boxes -->
  <rect x="40" y="424" width="165" height="50" rx="10" fill="#0d1f38" stroke="rgba(56,189,248,0.1)" stroke-width="1"/>
  <text x="70" y="446" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="11" font-weight="500">PostgreSQL</text>
  <text x="70" y="463" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="9">+ pgvector</text>

  <rect x="225" y="424" width="155" height="50" rx="10" fill="#0d1f38" stroke="rgba(56,189,248,0.1)" stroke-width="1"/>
  <text x="255" y="446" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="11" font-weight="500">MLflow</text>
  <text x="255" y="463" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="9">tracking :5000</text>

  <rect x="400" y="424" width="170" height="50" rx="10" fill="#0d1f38" stroke="rgba(56,189,248,0.1)" stroke-width="1"/>
  <text x="430" y="446" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="11" font-weight="500">recif-state</text>
  <text x="430" y="463" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="9">Git repo (GitOps)</text>

  <rect x="590" y="424" width="165" height="50" rx="10" fill="#0d1f38" stroke="rgba(56,189,248,0.1)" stroke-width="1"/>
  <text x="620" y="446" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="11" font-weight="500">Istio</text>
  <text x="620" y="463" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="9">mTLS + canary</text>

  <!-- Subtle decorative elements -->
  <circle cx="38" y="46" r="6" fill="#22d3ee" opacity="0.08"/>
  <circle cx="288" y="46" r="6" fill="#22d3ee" opacity="0.08"/>
  <circle cx="538" y="46" r="6" fill="#22d3ee" opacity="0.08"/>
</svg>