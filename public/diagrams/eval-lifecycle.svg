<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
    </style>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#22c55e" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-pink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#f472b6" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#a78bfa" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#eab308" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-muted" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#64748b" stroke-width="1.2"/>
    </marker>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a30"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" rx="16" fill="url(#bg-gradient)"/>

  <!-- Title -->
  <text x="400" y="24" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="10" font-weight="500" letter-spacing="2">EVALUATION-DRIVEN LIFECYCLE</text>

  <!-- ══════ TOP ROW (left to right) ══════ -->

  <!-- Ingest (Marée) — pink -->
  <rect x="28" y="48" width="148" height="58" rx="12" fill="#0d1f38" stroke="rgba(244,114,182,0.25)" stroke-width="1"/>
  <rect x="28" y="48" width="4" height="58" rx="2" fill="#f472b6"/>
  <text x="102" y="72" text-anchor="middle" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="12" font-weight="600">Ingest</text>
  <text x="102" y="92" text-anchor="middle" fill="#f472b6" font-family="JetBrains Mono, monospace" font-size="10">Marée</text>

  <!-- Arrow → -->
  <line x1="176" y1="77" x2="204" y2="77" stroke="#f472b6" stroke-width="1.5" marker-end="url(#arrow-pink)"/>

  <!-- Golden Dataset — green -->
  <rect x="214" y="48" width="148" height="58" rx="12" fill="#0d1f38" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <rect x="214" y="48" width="4" height="58" rx="2" fill="#22c55e"/>
  <text x="288" y="72" text-anchor="middle" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="12" font-weight="600">Golden Dataset</text>
  <text x="288" y="92" text-anchor="middle" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="10">test cases</text>

  <!-- Arrow → -->
  <line x1="362" y1="77" x2="390" y2="77" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Evaluate — cyan -->
  <rect x="400" y="48" width="168" height="58" rx="12" fill="#0d1f38" stroke="rgba(34,211,238,0.25)" stroke-width="1"/>
  <rect x="400" y="48" width="4" height="58" rx="2" fill="#22d3ee"/>
  <text x="484" y="72" text-anchor="middle" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="12" font-weight="600">Evaluate</text>
  <text x="484" y="92" text-anchor="middle" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="10">14 MLflow scorers</text>

  <!-- Arrow → -->
  <line x1="568" y1="77" x2="596" y2="77" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- Quality Gate — purple -->
  <rect x="606" y="48" width="160" height="58" rx="12" fill="#0d1f38" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
  <rect x="606" y="48" width="4" height="58" rx="2" fill="#a78bfa"/>
  <text x="686" y="72" text-anchor="middle" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="12" font-weight="600">Quality Gate</text>
  <text x="686" y="92" text-anchor="middle" fill="#a78bfa" font-family="JetBrains Mono, monospace" font-size="10">approve / reject</text>

  <!-- ══════ Connecting arrow: top right → bottom right ══════ -->
  <line x1="686" y1="106" x2="686" y2="150" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- ══════ BOTTOM ROW (right to left) ══════ -->

  <!-- Release (GitOps) — purple -->
  <rect x="606" y="158" width="160" height="58" rx="12" fill="#0d1f38" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
  <rect x="762" y="158" width="4" height="58" rx="2" fill="#a78bfa"/>
  <text x="686" y="182" text-anchor="middle" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="12" font-weight="600">Release</text>
  <text x="686" y="202" text-anchor="middle" fill="#a78bfa" font-family="JetBrains Mono, monospace" font-size="10">GitOps</text>

  <!-- Arrow ← -->
  <line x1="606" y1="187" x2="576" y2="187" stroke="#eab308" stroke-width="1.5" marker-end="url(#arrow-yellow)"/>

  <!-- Canary — yellow -->
  <rect x="400" y="158" width="168" height="58" rx="12" fill="#0d1f38" stroke="rgba(234,179,8,0.25)" stroke-width="1"/>
  <rect x="564" y="158" width="4" height="58" rx="2" fill="#eab308"/>
  <text x="484" y="182" text-anchor="middle" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="12" font-weight="600">Canary</text>
  <text x="484" y="202" text-anchor="middle" fill="#eab308" font-family="JetBrains Mono, monospace" font-size="10">10% → 100%</text>

  <!-- Arrow ← -->
  <line x1="400" y1="187" x2="370" y2="187" stroke="#eab308" stroke-width="1.5" marker-end="url(#arrow-yellow)"/>

  <!-- Production — cyan -->
  <rect x="214" y="158" width="148" height="58" rx="12" fill="#0d1f38" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <rect x="358" y="158" width="4" height="58" rx="2" fill="#22d3ee"/>
  <text x="288" y="182" text-anchor="middle" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="12" font-weight="600">Production</text>
  <text x="288" y="202" text-anchor="middle" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="10">monitoring</text>

  <!-- ══════ FEEDBACK LOOP ══════ -->
  <!-- Arrow: Production → down to Feedback -->
  <line x1="288" y1="216" x2="288" y2="248" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-muted)"/>

  <!-- Feedback box -->
  <rect x="214" y="248" width="148" height="40" rx="10" fill="#0d1f38" stroke="rgba(244,114,182,0.15)" stroke-width="1"/>
  <text x="288" y="273" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="11">User Feedback</text>
  <text x="252" y="273" fill="#f472b6" font-family="Inter, sans-serif" font-size="11">&#x1F44D;&#x1F44E;</text>

  <!-- Feedback → back to Golden Dataset (curved path) -->
  <path d="M 214 268 L 120 268 Q 100 268 100 248 L 100 130 Q 100 110 120 110 L 288 110 L 288 106"
        stroke="#f472b6" stroke-width="1.2" fill="none" stroke-dasharray="5 3" marker-end="url(#arrow-pink)" opacity="0.6"/>
  <text x="92" y="192" fill="#f472b6" font-family="JetBrains Mono, monospace" font-size="8" transform="rotate(-90,92,192)" text-anchor="middle">feedback loop</text>

  <!-- Flow direction labels -->
  <text x="400" y="42" text-anchor="middle" fill="#475569" font-family="Inter, sans-serif" font-size="8">BUILD &amp; VALIDATE →</text>
  <text x="550" y="152" text-anchor="middle" fill="#475569" font-family="Inter, sans-serif" font-size="8">← DEPLOY &amp; MONITOR</text>
</svg>