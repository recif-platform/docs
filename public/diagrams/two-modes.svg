<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr-c" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arr-p" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f472b6"/>
    </marker>
  </defs>

  <rect width="800" height="400" rx="16" fill="#0a1628"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600" letter-spacing="3" font-family="JetBrains Mono, monospace">BOTH ACCESS PATHS — SIMULTANEOUSLY</text>

  <!-- ══════ CENTER: The Agent ══════ -->
  <rect x="280" y="130" width="240" height="90" rx="14" fill="#0d1f38" stroke="rgba(167,139,250,0.3)" stroke-width="1.5" filter="url(#glow)"/>
  <text x="400" y="157" text-anchor="middle" fill="#a78bfa" font-size="16" font-weight="700">HR Assistant</text>
  <text x="400" y="177" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="JetBrains Mono, monospace">Corail · gpt-4o · port 8000</text>
  <text x="400" y="195" text-anchor="middle" fill="#64748b" font-size="10">Tools · RAG · Memory · Guards · Slack · REST</text>

  <!-- Autonomous label -->
  <rect x="335" y="225" width="130" height="18" rx="5" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.15)" stroke-width="0.5"/>
  <text x="400" y="237" text-anchor="middle" fill="#a78bfa" font-size="8" font-weight="600">autonomous container</text>

  <!-- ══════ TOP-LEFT: Direct access (green) ══════ -->
  <!-- CI/CD -->
  <rect x="30" y="50" width="110" height="45" rx="10" fill="#0d1f38" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <text x="85" y="70" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">🤖 CI/CD</text>
  <text x="85" y="85" text-anchor="middle" fill="#64748b" font-size="9">REST API direct</text>

  <!-- Slack bot -->
  <rect x="30" y="110" width="110" height="45" rx="10" fill="#0d1f38" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <text x="85" y="130" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">💬 Slack Bot</text>
  <text x="85" y="145" text-anchor="middle" fill="#64748b" font-size="9">Channel direct</text>

  <!-- Your backend -->
  <rect x="30" y="170" width="110" height="45" rx="10" fill="#0d1f38" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <text x="85" y="190" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">⚡ Your App</text>
  <text x="85" y="205" text-anchor="middle" fill="#64748b" font-size="9">SDK / HTTP</text>

  <!-- Green arrows: direct to agent -->
  <line x1="140" y1="72" x2="280" y2="155" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="140" y1="132" x2="280" y2="165" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="140" y1="192" x2="280" y2="175" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Direct label -->
  <text x="195" y="100" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="600">direct</text>
  <text x="195" y="112" text-anchor="middle" fill="#64748b" font-size="8">no platform</text>

  <!-- ══════ TOP-RIGHT: Platform access (cyan) ══════ -->
  <!-- Employee -->
  <rect x="660" y="50" width="110" height="45" rx="10" fill="#0d1f38" stroke="rgba(34,211,238,0.25)" stroke-width="1"/>
  <text x="715" y="70" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="600">👤 Employee</text>
  <text x="715" y="85" text-anchor="middle" fill="#64748b" font-size="9">Dashboard UI</text>

  <!-- Manager -->
  <rect x="660" y="110" width="110" height="45" rx="10" fill="#0d1f38" stroke="rgba(34,211,238,0.25)" stroke-width="1"/>
  <text x="715" y="130" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="600">👩‍💼 Manager</text>
  <text x="715" y="145" text-anchor="middle" fill="#64748b" font-size="9">Chat + Feedback</text>

  <!-- API Consumer -->
  <rect x="660" y="170" width="110" height="45" rx="10" fill="#0d1f38" stroke="rgba(34,211,238,0.25)" stroke-width="1"/>
  <text x="715" y="190" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="600">🔑 API User</text>
  <text x="715" y="205" text-anchor="middle" fill="#64748b" font-size="9">Auth + RBAC</text>

  <!-- Récif Platform box -->
  <rect x="545" y="255" width="140" height="55" rx="10" fill="#0d1f38" stroke="rgba(34,211,238,0.3)" stroke-width="1.5"/>
  <text x="615" y="277" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700">Récif API</text>
  <text x="615" y="295" text-anchor="middle" fill="#64748b" font-size="9" font-family="JetBrains Mono, monospace">Go :8080 · proxy</text>

  <!-- Cyan arrows: users → Récif -->
  <line x1="660" y1="80" x2="620" y2="255" stroke="#22d3ee" stroke-width="1.3" marker-end="url(#arr-c)" opacity="0.7"/>
  <line x1="660" y1="135" x2="618" y2="255" stroke="#22d3ee" stroke-width="1.3" marker-end="url(#arr-c)" opacity="0.7"/>
  <line x1="660" y1="192" x2="615" y2="255" stroke="#22d3ee" stroke-width="1.3" marker-end="url(#arr-c)" opacity="0.7"/>

  <!-- Cyan arrow: Récif → Agent -->
  <line x1="545" y1="282" x2="480" y2="200" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr-c)"/>
  <text x="500" y="250" text-anchor="middle" fill="#22d3ee" font-size="9" font-weight="600">via platform</text>
  <text x="500" y="262" text-anchor="middle" fill="#64748b" font-size="8">+ governance</text>

  <!-- ══════ BOTTOM: Governance layer ══════ -->
  <rect x="330" y="290" width="200" height="40" rx="8" fill="rgba(34,211,238,0.04)" stroke="rgba(34,211,238,0.1)" stroke-width="0.5"/>
  <text x="430" y="307" text-anchor="middle" fill="#22d3ee" font-size="8" font-weight="500">Eval · Governance · Releases</text>
  <text x="430" y="322" text-anchor="middle" fill="#64748b" font-size="8">Monitoring · Feedback · RBAC</text>

  <!-- Arrow from Récif to governance -->
  <line x1="580" y1="310" x2="530" y2="310" stroke="rgba(34,211,238,0.3)" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- ══════ BOTTOM CENTER: Key message ══════ -->
  <rect x="150" y="355" width="500" height="30" rx="8" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.12)" stroke-width="0.5"/>
  <text x="400" y="374" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="500">Both paths hit the <tspan fill="#a78bfa" font-weight="700">same agent</tspan> simultaneously — no code changes, no lock-in</text>
</svg>
