<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
    </style>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#22c55e" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#ef4444" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-muted" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#64748b" stroke-width="1.2"/>
    </marker>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a30"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" rx="16" fill="url(#bg-gradient)"/>

  <!-- Title -->
  <text x="400" y="24" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="10" font-weight="500" letter-spacing="2">DEPLOYMENT FLOW</text>

  <!-- Central spine: vertical line -->
  <line x1="280" y1="50" x2="280" y2="310" stroke="rgba(56,189,248,0.06)" stroke-width="1"/>

  <!-- ══════ STEP 1: Create Agent ══════ -->
  <circle cx="280" cy="56" r="12" fill="#22d3ee" opacity="0.12"/>
  <text x="280" y="60" text-anchor="middle" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">1</text>

  <rect x="308" y="38" width="260" height="40" rx="10" fill="#0d1f38" stroke="rgba(56,189,248,0.2)" stroke-width="1"/>
  <text x="340" y="56" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="12" font-weight="600">Create Agent</text>
  <text x="340" y="71" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9">Dashboard or API</text>
  <text x="498" y="63" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="8">POST /api/v1/agents</text>

  <!-- Arrow 1→2 -->
  <line x1="280" y1="68" x2="280" y2="96" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- ══════ STEP 2: Agent CRD ══════ -->
  <circle cx="280" cy="110" r="12" fill="#22d3ee" opacity="0.12"/>
  <text x="280" y="114" text-anchor="middle" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">2</text>

  <rect x="308" y="92" width="260" height="40" rx="10" fill="#0d1f38" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
  <rect x="308" y="92" width="4" height="40" rx="2" fill="#a78bfa"/>
  <text x="326" y="110" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="12" font-weight="600">Agent CRD</text>
  <text x="326" y="125" fill="#a78bfa" font-family="JetBrains Mono, monospace" font-size="9">kubectl apply → team-default</text>

  <!-- Arrow 2→3 -->
  <line x1="280" y1="122" x2="280" y2="150" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- ══════ STEP 3: Operator Reconciles ══════ -->
  <circle cx="280" cy="164" r="12" fill="#22d3ee" opacity="0.12"/>
  <text x="280" y="168" text-anchor="middle" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">3</text>

  <rect x="308" y="146" width="180" height="40" rx="10" fill="#0d1f38" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <rect x="308" y="146" width="4" height="40" rx="2" fill="#22d3ee"/>
  <text x="326" y="163" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="12" font-weight="600">Operator Reconciles</text>
  <text x="326" y="178" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="9">kubebuilder</text>

  <!-- Branch arrows to K8s resources -->
  <line x1="488" y1="154" x2="520" y2="140" stroke="#64748b" stroke-width="1" marker-end="url(#arrow-muted)"/>
  <line x1="488" y1="166" x2="520" y2="166" stroke="#64748b" stroke-width="1" marker-end="url(#arrow-muted)"/>
  <line x1="488" y1="178" x2="520" y2="192" stroke="#64748b" stroke-width="1" marker-end="url(#arrow-muted)"/>

  <!-- K8s resource boxes -->
  <rect x="534" y="126" width="110" height="28" rx="6" fill="#0a1628" stroke="rgba(56,189,248,0.12)" stroke-width="1"/>
  <text x="589" y="144" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9">Deployment</text>

  <rect x="534" y="158" width="110" height="28" rx="6" fill="#0a1628" stroke="rgba(56,189,248,0.12)" stroke-width="1"/>
  <text x="589" y="176" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9">Service</text>

  <rect x="534" y="190" width="110" height="28" rx="6" fill="#0a1628" stroke="rgba(56,189,248,0.12)" stroke-width="1"/>
  <text x="589" y="208" text-anchor="middle" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="9">ConfigMap</text>

  <!-- Arrow 3→4 -->
  <line x1="280" y1="176" x2="280" y2="208" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- ══════ STEP 4: Release committed to Git ══════ -->
  <circle cx="280" cy="222" r="12" fill="#22d3ee" opacity="0.12"/>
  <text x="280" y="226" text-anchor="middle" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">4</text>

  <rect x="308" y="204" width="260" height="40" rx="10" fill="#0d1f38" stroke="rgba(234,179,8,0.2)" stroke-width="1"/>
  <rect x="308" y="204" width="4" height="40" rx="2" fill="#eab308"/>
  <text x="326" y="221" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="12" font-weight="600">Release v{N}</text>
  <text x="326" y="237" fill="#eab308" font-family="JetBrains Mono, monospace" font-size="9">committed to recif-state</text>
  <text x="504" y="229" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="8">immutable YAML</text>

  <!-- Arrow 4→5 -->
  <line x1="280" y1="234" x2="280" y2="264" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- ══════ STEP 5: Eval Gate ══════ -->
  <circle cx="280" cy="278" r="12" fill="#22d3ee" opacity="0.12"/>
  <text x="280" y="282" text-anchor="middle" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">5</text>

  <rect x="308" y="260" width="180" height="40" rx="10" fill="#0d1f38" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
  <rect x="308" y="260" width="4" height="40" rx="2" fill="#a78bfa"/>
  <text x="326" y="277" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="12" font-weight="600">Eval Gate</text>
  <text x="326" y="293" fill="#a78bfa" font-family="JetBrains Mono, monospace" font-size="9">score vs threshold</text>

  <!-- Branch: approved -->
  <line x1="488" y1="272" x2="530" y2="262" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="544" y="248" width="140" height="32" rx="8" fill="#0d1f38" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="560" y="269" fill="#22c55e" font-family="Inter, sans-serif" font-size="12" font-weight="600">&#x2705; Approved</text>

  <!-- Branch: rejected -->
  <line x1="488" y1="288" x2="530" y2="298" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="544" y="286" width="140" height="32" rx="8" fill="#0d1f38" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <text x="560" y="307" fill="#ef4444" font-family="Inter, sans-serif" font-size="12" font-weight="600">&#x274C; Rejected</text>

  <!-- Sub-labels for approved/rejected -->
  <text x="694" y="268" fill="#475569" font-family="JetBrains Mono, monospace" font-size="8">current.yaml updated</text>
  <text x="694" y="306" fill="#475569" font-family="JetBrains Mono, monospace" font-size="8">previous version stays</text>

  <!-- Left side decorative labels -->
  <text x="40" y="60" fill="#1e293b" font-family="JetBrains Mono, monospace" font-size="8">// dashboard</text>
  <text x="40" y="114" fill="#1e293b" font-family="JetBrains Mono, monospace" font-size="8">// kubernetes</text>
  <text x="40" y="168" fill="#1e293b" font-family="JetBrains Mono, monospace" font-size="8">// reconcile</text>
  <text x="40" y="226" fill="#1e293b" font-family="JetBrains Mono, monospace" font-size="8">// gitops</text>
  <text x="40" y="282" fill="#1e293b" font-family="JetBrains Mono, monospace" font-size="8">// quality</text>
</svg>