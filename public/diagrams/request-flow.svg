<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
    </style>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#22c55e" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-muted" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#64748b" stroke-width="1.2"/>
    </marker>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a30"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="sse-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="16" fill="url(#bg-gradient)"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="10" font-weight="500" letter-spacing="2">REQUEST FLOW</text>

  <!-- ══════ STEP 1: User ══════ -->
  <circle cx="60" cy="160" r="34" fill="#0d1f38" stroke="rgba(56,189,248,0.2)" stroke-width="1"/>
  <circle cx="60" cy="160" r="34" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.1" filter="url(#glow-cyan)"/>
  <text x="60" y="155" text-anchor="middle" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="22">&#x1F464;</text>
  <text x="60" y="175" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="9">User</text>

  <!-- Step number 1 -->
  <circle cx="60" cy="118" r="10" fill="#22d3ee" opacity="0.15"/>
  <text x="60" y="122" text-anchor="middle" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600">1</text>

  <!-- Arrow 1→2 -->
  <line x1="94" y1="160" x2="148" y2="160" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="121" y="150" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="8">POST</text>

  <!-- ══════ STEP 2: Récif API ══════ -->
  <rect x="158" y="126" width="148" height="68" rx="12" fill="#0d1f38" stroke="rgba(56,189,248,0.2)" stroke-width="1"/>
  <text x="232" y="151" text-anchor="middle" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="13" font-weight="600">Récif API</text>
  <text x="232" y="169" text-anchor="middle" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="10">Go :8080</text>
  <text x="232" y="185" text-anchor="middle" fill="#475569" font-family="JetBrains Mono, monospace" font-size="8">/agents/{id}/chat/stream</text>

  <!-- Step number 2 -->
  <circle cx="170" cy="118" r="10" fill="#22d3ee" opacity="0.15"/>
  <text x="170" y="122" text-anchor="middle" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600">2</text>

  <!-- Arrow 2→3 -->
  <line x1="306" y1="160" x2="354" y2="160" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="330" y="150" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="8">proxy</text>

  <!-- ══════ STEP 3: Corail Agent Pipeline ══════ -->
  <rect x="364" y="60" width="280" height="210" rx="14" fill="#0d1f38" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>

  <!-- Step number 3 -->
  <circle cx="376" cy="52" r="10" fill="#22d3ee" opacity="0.15"/>
  <text x="376" y="56" text-anchor="middle" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600">3</text>

  <text x="504" y="82" text-anchor="middle" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="13" font-weight="600">Corail Agent</text>
  <text x="504" y="97" text-anchor="middle" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="9">Python :8000</text>

  <!-- Pipeline boxes inside -->
  <rect x="384" y="112" width="68" height="30" rx="6" fill="#0a1628" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>
  <text x="418" y="131" text-anchor="middle" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="10">Input</text>

  <line x1="452" y1="127" x2="464" y2="127" stroke="#22d3ee" stroke-width="1" marker-end="url(#arrow-cyan)"/>

  <rect x="470" y="112" width="68" height="30" rx="6" fill="#0a1628" stroke="rgba(244,114,182,0.2)" stroke-width="1"/>
  <text x="504" y="131" text-anchor="middle" fill="#f472b6" font-family="Inter, sans-serif" font-size="10">Guards</text>

  <line x1="538" y1="127" x2="550" y2="127" stroke="#22d3ee" stroke-width="1" marker-end="url(#arrow-cyan)"/>

  <rect x="556" y="112" width="72" height="30" rx="6" fill="#0a1628" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
  <text x="592" y="131" text-anchor="middle" fill="#a78bfa" font-family="Inter, sans-serif" font-size="10">Strategy</text>

  <!-- Strategy → LLM (below) -->
  <line x1="592" y1="142" x2="592" y2="160" stroke="#22d3ee" stroke-width="1" marker-end="url(#arrow-cyan)"/>

  <rect x="556" y="166" width="72" height="30" rx="6" fill="#0a1628" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <text x="592" y="185" text-anchor="middle" fill="#22d3ee" font-family="Inter, sans-serif" font-size="10" font-weight="500">LLM</text>

  <!-- Side branch: Tools / Memory / RAG -->
  <rect x="384" y="158" width="145" height="92" rx="8" fill="#081220" stroke="rgba(56,189,248,0.08)" stroke-width="1"/>
  <text x="456" y="177" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="9" font-weight="500">EXTENSIONS</text>

  <rect x="396" y="184" width="56" height="22" rx="5" fill="#0d1f38" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="424" y="199" text-anchor="middle" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="9">Tools</text>

  <rect x="460" y="184" width="56" height="22" rx="5" fill="#0d1f38" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
  <text x="488" y="199" text-anchor="middle" fill="#a78bfa" font-family="JetBrains Mono, monospace" font-size="9">Memory</text>

  <rect x="424" y="214" width="56" height="22" rx="5" fill="#0d1f38" stroke="rgba(234,179,8,0.2)" stroke-width="1"/>
  <text x="452" y="229" text-anchor="middle" fill="#eab308" font-family="JetBrains Mono, monospace" font-size="9">RAG</text>

  <!-- Connector: side branch to strategy -->
  <line x1="529" y1="200" x2="556" y2="180" stroke="#64748b" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- ══════ STEP 4: SSE Response ══════ -->
  <!-- Arrow from pipeline to response -->
  <line x1="592" y1="196" x2="592" y2="300" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="592" y1="300" x2="504" y2="300" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="504" y1="300" x2="504" y2="320" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="390" y="328" width="228" height="62" rx="12" fill="#0d1f38" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>

  <!-- Step number 4 -->
  <circle cx="402" cy="320" r="10" fill="#22c55e" opacity="0.15"/>
  <text x="402" y="324" text-anchor="middle" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600">4</text>

  <text x="504" y="350" text-anchor="middle" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="13" font-weight="600">SSE Response</text>
  <text x="504" y="367" text-anchor="middle" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="9">text/event-stream</text>
  <text x="504" y="382" text-anchor="middle" fill="#475569" font-family="JetBrains Mono, monospace" font-size="8">thinking → tokens → done → suggestions</text>

  <!-- Streaming indicator dots -->
  <circle cx="418" cy="350" r="2.5" fill="#22c55e" opacity="0.8"/>
  <circle cx="428" cy="350" r="2.5" fill="#22c55e" opacity="0.5"/>
  <circle cx="438" cy="350" r="2.5" fill="#22c55e" opacity="0.25"/>

  <!-- Return arrow back to user -->
  <line x1="390" y1="359" x2="100" y2="359" stroke="#22c55e" stroke-width="1" stroke-dasharray="6 3" opacity="0.4"/>
  <line x1="100" y1="359" x2="60" y2="200" stroke="#22c55e" stroke-width="1" stroke-dasharray="6 3" opacity="0.4" marker-end="url(#arrow-green)"/>
  <text x="80" y="290" fill="#475569" font-family="JetBrains Mono, monospace" font-size="8" transform="rotate(-75,80,290)">stream</text>
</svg>